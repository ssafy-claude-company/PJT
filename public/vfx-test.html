<!DOCTYPE html>
<!-- VFX Test Harness — owned by VFX 전문가
     Standalone page for QA-independent verification of vfx.js effects.
     Visit /vfx-test.html in browser to exercise each effect individually.
     All tests run automatically on load; results logged in the on-screen panel. -->
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>VFX Test Harness</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;color:#eee;font-family:monospace;overflow:hidden}
    canvas{display:block}
    #ui{position:fixed;top:0;left:0;width:320px;height:100vh;background:rgba(0,0,0,.82);
        padding:12px;overflow-y:auto;font-size:11px;line-height:1.6;z-index:99}
    #ui h1{font-size:13px;color:#0cf;margin-bottom:8px}
    .ok{color:#4f4}
    .fail{color:#f44}
    .section{margin-top:8px;color:#fa0;font-size:10px;text-transform:uppercase}
    #fps-display{position:fixed;top:8px;right:12px;font-size:14px;color:#0cf;z-index:99}
    #kill-vignette{position:fixed;inset:0;pointer-events:none;z-index:10;opacity:0}
    #controls{position:fixed;bottom:12px;left:328px;display:flex;gap:8px;z-index:99;flex-wrap:wrap}
    button{background:#222;color:#ccc;border:1px solid #444;padding:4px 10px;cursor:pointer;font-size:11px}
    button:hover{background:#333;color:#0cf}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="kill-vignette"></div>
<div id="fps-display">FPS: —</div>
<div id="ui">
  <h1>VFX Test Harness</h1>
  <div id="log"></div>
</div>
<div id="controls">
  <button onclick="fireShoot()">🔫 Shoot (Muzzle)</button>
  <button onclick="fireHit()">💥 Hit (Particles)</button>
  <button onclick="fireHitShake()">📷 Shake (hit)</button>
  <button onclick="fireDeathShake()">💀 Shake (death)</button>
  <button onclick="fireKillVig()">🥇 KillVignette (gold)</button>
  <button onclick="fireDeathVig()">🔴 KillVignette (red)</button>
  <button onclick="toggleBloom()">🌟 Toggle Bloom</button>
  <button onclick="runAutoTest()">▶ Auto-Test All</button>
</div>

<script type="module">
import * as THREE from '/three.module.js';
import VFXSystem, { VFX_CFG as _VFX_CFG } from '/vfx.js';

// ── Three.js minimal scene ────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.autoClear = false;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.6, 5);
camera.lookAt(0, 1, 0);
scene.add(camera);

// Minimal room — floor + back wall + ambient + point light
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness:0.9 });
const wallMat  = new THREE.MeshStandardMaterial({ color: 0x1e2030, roughness:0.8 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30,10), wallMat);
backWall.position.set(0, 5, -10);
scene.add(backWall);

// Emissive target box — should bloom brightly (tests bloom threshold)
const boxMat = new THREE.MeshStandardMaterial({ color:0x0044ff, emissive:0x0044ff, emissiveIntensity:3.5 });
const targetBox = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), boxMat);
targetBox.position.set(0, 1.4, -4);
scene.add(targetBox);

// Second emissive strip — warm orange, also should bloom
const stripMat = new THREE.MeshStandardMaterial({ color:0xff6600, emissive:0xff4400, emissiveIntensity:2.5 });
const strip = new THREE.Mesh(new THREE.BoxGeometry(6, 0.08, 0.08), stripMat);
strip.position.set(0, 2.8, -8);
scene.add(strip);

scene.add(new THREE.AmbientLight(0x223355, 0.6));
const keyLight = new THREE.PointLight(0xffffff, 1.2, 25); keyLight.position.set(3,5,2);
scene.add(keyLight);

// ── VFX System ────────────────────────────────────────────────────────────────
const vfxSys = new VFXSystem({ THREE, scene, renderer, camera });

// ── Particle pool (replicate index.html's vfx object for test) ────────────────
// -- Particle effect class (same as index.html, for isolation test) ------------
class VFXParticleEffect {
  constructor(count, size) {
    this.count = count; this.posArr = new Float32Array(count*3);
    this.velArr = new Float32Array(count*3); this.colArr = new Float32Array(count*3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this.posArr,3));
    geo.setAttribute('color',    new THREE.BufferAttribute(this.colArr,3));
    this.mat  = new THREE.PointsMaterial({ vertexColors:true, size, transparent:true, opacity:0,
      depthTest:true, depthWrite:false, sizeAttenuation:true });
    this.mesh = new THREE.Points(geo, this.mat);
    this.mesh.frustumCulled = false; this.mesh.visible = false;
    scene.add(this.mesh);
    this.active=false; this.startTime=0; this.duration=0;
  }
  _init(ox,oy,oz,duration){
    this.active=true; this.startTime=performance.now(); this.duration=duration;
    this.mesh.visible=true; this.mat.opacity=1;
    for(let i=0;i<this.count;i++){const i3=i*3;this.posArr[i3]=ox;this.posArr[i3+1]=oy;this.posArr[i3+2]=oz;}
    this.mesh.geometry.attributes.position.needsUpdate=true;
  }
  activateMuzzle(ox,oy,oz,fwx,fwy,fwz){
    this._init(ox,oy,oz,100);
    const len=Math.sqrt(fwx*fwx+fwy*fwy+fwz*fwz)||1;
    const nx=fwx/len,ny=fwy/len,nz=fwz/len;
    let ux,uy,uz;
    if(Math.abs(nx)<=Math.abs(ny)&&Math.abs(nx)<=Math.abs(nz)){ux=0;uy=-nz;uz=ny;}
    else if(Math.abs(ny)<=Math.abs(nz)){ux=nz;uy=0;uz=-nx;}
    else{ux=-ny;uy=nx;uz=0;}
    const ul=Math.sqrt(ux*ux+uy*uy+uz*uz)||1; ux/=ul;uy/=ul;uz/=ul;
    const vx=ny*uz-nz*uy,vy=nz*ux-nx*uz,vz=nx*uy-ny*ux;
    for(let i=0;i<this.count;i++){
      const i3=i*3,theta=Math.random()*Math.PI*2,r=Math.random()*0.28;
      const sp=2+Math.random()*3.5;
      const dx=nx+(ux*Math.cos(theta)+vx*Math.sin(theta))*r;
      const dy=ny+(uy*Math.cos(theta)+vy*Math.sin(theta))*r;
      const dz=nz+(uz*Math.cos(theta)+vz*Math.sin(theta))*r;
      const dl=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
      this.velArr[i3]=(dx/dl)*sp;this.velArr[i3+1]=(dy/dl)*sp;this.velArr[i3+2]=(dz/dl)*sp;
    }
    for(let i=0;i<this.count;i++){const t=Math.random(),c3=i*3;
      this.colArr[c3]=1;this.colArr[c3+1]=0.78+t*0.22;this.colArr[c3+2]=t*0.4;}
    this.mesh.geometry.attributes.color.needsUpdate=true;
  }
  activateHit(ox,oy,oz){
    this._init(ox,oy,oz,300);
    for(let i=0;i<this.count;i++){
      const i3=i*3,theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
      const sp=3+Math.random()*4.5;
      this.velArr[i3]=Math.sin(phi)*Math.cos(theta)*sp;
      this.velArr[i3+1]=Math.cos(phi)*sp+2;
      this.velArr[i3+2]=Math.sin(phi)*Math.sin(theta)*sp;
    }
    for(let i=0;i<this.count;i++){const t=Math.random(),c3=i*3;
      if(Math.random()<0.15){this.colArr[c3]=1;this.colArr[c3+1]=0.38+t*0.3;this.colArr[c3+2]=0;}
      else{this.colArr[c3]=0.6+t*0.4;this.colArr[c3+1]=0;this.colArr[c3+2]=0;}}
    this.mesh.geometry.attributes.color.needsUpdate=true;
  }
  update(dt){
    if(!this.active)return;
    const elapsed=performance.now()-this.startTime;
    if(elapsed>=this.duration){this.deactivate();return;}
    this.mat.opacity=Math.max(0,1-elapsed/this.duration);
    const drag=Math.exp(-3.5*dt);
    for(let i=0;i<this.count;i++){const i3=i*3;
      this.posArr[i3]+=this.velArr[i3]*dt;this.posArr[i3+1]+=this.velArr[i3+1]*dt;
      this.posArr[i3+2]+=this.velArr[i3+2]*dt;
      this.velArr[i3]*=drag;this.velArr[i3+1]=this.velArr[i3+1]*drag-9.8*dt;
      this.velArr[i3+2]*=drag;}
    this.mesh.geometry.attributes.position.needsUpdate=true;
  }
  deactivate(){this.active=false;this.mesh.visible=false;this.mat.opacity=0;}
}

// Pool
const MUZZLE_POOL_SIZE=3, HIT_POOL_SIZE=6;
const muzzlePool=[],hitPool=[];
for(let i=0;i<MUZZLE_POOL_SIZE;i++) muzzlePool.push(new VFXParticleEffect(24,9));
for(let i=0;i<HIT_POOL_SIZE;i++)    hitPool.push(new VFXParticleEffect(32,6.5));
function _free(pool){for(const p of pool)if(!p.active)return p;
  let o=pool[0];for(const p of pool)if(p.startTime<o.startTime)o=p;o.deactivate();return o;}
const vfx = {
  spawnMuzzleFlash:(ox,oy,oz,fwx,fwy,fwz)=>_free(muzzlePool).activateMuzzle(ox,oy,oz,fwx,fwy,fwz),
  spawnHit:(ox,oy,oz)=>_free(hitPool).activateHit(ox,oy,oz),
  update:(dt)=>{for(const p of muzzlePool)p.update(dt);for(const p of hitPool)p.update(dt);},
};

// ── Expose on window for QA / manual testing ──────────────────────────────────
window.__VFX = { sys:vfxSys, pool:vfx, cfg:_VFX_CFG };

// ── Global helpers for manual buttons ────────────────────────────────────────
window.VFX_CFG = _VFX_CFG;
window.fireShoot     = () => {
  vfx.spawnMuzzleFlash(camera.position.x, camera.position.y-0.2, camera.position.z-1,
    -Math.sin(0),0,-Math.cos(0));
  vfxSys.onShoot();
};
window.fireHit       = () => vfx.spawnHit(
  targetBox.position.x + (Math.random()-.5),
  targetBox.position.y + (Math.random()-.5),
  targetBox.position.z
);
window.fireHitShake  = () => vfxSys.triggerShake('hit');
window.fireDeathShake= () => vfxSys.triggerShake('death');
window.fireKillVig   = () => vfxSys.triggerKillVignette(true);
window.fireDeathVig  = () => vfxSys.triggerKillVignette(false);
window.toggleBloom   = () => {
  _VFX_CFG.DBG_BLOOM = !_VFX_CFG.DBG_BLOOM;
  log(`Bloom toggled → ${_VFX_CFG.DBG_BLOOM} (reload required for shader rebuild)`, _VFX_CFG.DBG_BLOOM?'ok':'fail');
};
window.runAutoTest   = runAutoTest;

// ── Logging ───────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls='ok'){
  const d=document.createElement('div');
  d.className=cls; d.textContent=msg; logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}
function section(label){
  const d=document.createElement('div'); d.className='section'; d.textContent=label;
  logEl.appendChild(d);
}

// ── Automated test suite ──────────────────────────────────────────────────────
function runAutoTest(){
  logEl.innerHTML='';
  let pass=0, fail=0;
  function check(label, cond){
    const ok = !!cond;
    log(`${ok?'✓':'✗'} ${label}`, ok?'ok':'fail');
    ok ? pass++ : fail++;
  }

  section('INIT');
  check('vfxSys defined',                     vfxSys !== undefined);
  check('vfxSys.renderWithBloom is function', typeof vfxSys.renderWithBloom === 'function');
  check('vfxSys.triggerShake is function',    typeof vfxSys.triggerShake    === 'function');
  check('vfxSys.triggerKillVignette fn',      typeof vfxSys.triggerKillVignette === 'function');
  check('vfxSys.onShoot is function',         typeof vfxSys.onShoot         === 'function');
  check('vfxSys.setSize is function',         typeof vfxSys.setSize         === 'function');
  check('vfxSys._muzzleLight created',        !!vfxSys._muzzleLight);
  check('muzzleLight starts at 0',            vfxSys._muzzleLight.intensity === 0);
  check('muzzleLight added to camera',        camera.children.includes(vfxSys._muzzleLight));
  check('bloom pipeline created',             typeof vfxSys._bloom === 'object');
  check('bloom.render is function',           typeof vfxSys._bloom.render === 'function');
  check('kill-vignette DOM exists',           !!document.getElementById('kill-vignette'));

  section('VFX_CFG CONSTANTS');
  const cfg = _VFX_CFG;
  check('MUZZLE_LIGHT_INTENSITY defined',     typeof cfg.MUZZLE_LIGHT_INTENSITY === 'number');
  check('MUZZLE_LIGHT_MS defined',            typeof cfg.MUZZLE_LIGHT_MS        === 'number');
  check('BLOOM_THRESHOLD defined',            typeof cfg.BLOOM_THRESHOLD        === 'number');
  check('BLOOM_STRENGTH defined',             typeof cfg.BLOOM_STRENGTH         === 'number');
  check('SHAKE_HIT_AMP defined',              typeof cfg.SHAKE_HIT_AMP          === 'number');
  check('SHAKE_DEATH_AMP defined',            typeof cfg.SHAKE_DEATH_AMP        === 'number');
  check('SHAKE_DECAY defined',                typeof cfg.SHAKE_DECAY            === 'number');
  check('SHAKE_FREQ defined',                 typeof cfg.SHAKE_FREQ             === 'number');
  check('KILL_VIG_HOLD defined',              typeof cfg.KILL_VIG_HOLD          === 'number');
  check('KILL_VIG_FADE defined',              typeof cfg.KILL_VIG_FADE          === 'number');
  check('DBG_BLOOM flag',                     typeof cfg.DBG_BLOOM              === 'boolean');
  check('DBG_CAMERA_SHAKE flag',              typeof cfg.DBG_CAMERA_SHAKE       === 'boolean');
  check('DBG_MUZZLE_LIGHT flag',              typeof cfg.DBG_MUZZLE_LIGHT       === 'boolean');
  check('DBG_KILL_VIGNETTE flag',             typeof cfg.DBG_KILL_VIGNETTE      === 'boolean');
  check('SHAKE_DEATH_AMP > SHAKE_HIT_AMP',   cfg.SHAKE_DEATH_AMP > cfg.SHAKE_HIT_AMP); // death harder

  section('MUZZLE LIGHT (onShoot)');
  vfxSys.onShoot();
  check('muzzleLight.intensity set on shoot', vfxSys._muzzleLight.intensity === cfg.MUZZLE_LIGHT_INTENSITY);
  // Verify clearTimeout idempotency: rapid fire must not crash
  vfxSys.onShoot(); vfxSys.onShoot(); vfxSys.onShoot();
  check('rapid-fire onShoot no throw',        vfxSys._muzzleLight.intensity === cfg.MUZZLE_LIGHT_INTENSITY);

  section('CAMERA SHAKE');
  vfxSys._shakeAmt = 0;
  vfxSys.triggerShake('hit');
  check('shakeAmt set after hit',             vfxSys._shakeAmt === cfg.SHAKE_HIT_AMP);
  vfxSys.triggerShake('death');
  check('shakeAmt max(hit,death)=death',      vfxSys._shakeAmt === cfg.SHAKE_DEATH_AMP);
  // Lower amp must NOT override higher
  vfxSys.triggerShake('hit');
  check('hit does not lower active shake',    vfxSys._shakeAmt === cfg.SHAKE_DEATH_AMP);
  // DBG off → no-op
  cfg.DBG_CAMERA_SHAKE = false;
  vfxSys._shakeAmt = 0;
  vfxSys.triggerShake('death');
  check('DBG_CAMERA_SHAKE=false → no-op',    vfxSys._shakeAmt === 0);
  cfg.DBG_CAMERA_SHAKE = true;

  section('KILL VIGNETTE');
  const vig = document.getElementById('kill-vignette');
  cfg.DBG_KILL_VIGNETTE = true;
  vfxSys.triggerKillVignette(true);
  check('kill vignette opacity=1 on gold',    vig.style.opacity === '1');
  check('gold bg is radial-gradient',         vig.style.background.includes('radial-gradient'));
  check('gold bg has yellow/orange tint',     vig.style.background.includes('255,220') || vig.style.background.includes('rgba(255'));
  vfxSys.triggerKillVignette(false);
  check('death vignette opacity=1 on red',    vig.style.opacity === '1');
  check('death bg is red radial',             vig.style.background.includes('220,0,0') || vig.style.background.includes('rgba(220'));
  // DBG off → no-op
  cfg.DBG_KILL_VIGNETTE = false;
  vig.style.opacity = '0';
  vfxSys.triggerKillVignette(true);
  check('DBG_KILL_VIGNETTE=false → no-op',   vig.style.opacity === '0');
  cfg.DBG_KILL_VIGNETTE = true;

  section('PARTICLE POOLS');
  check('muzzlePool size correct',            muzzlePool.length === MUZZLE_POOL_SIZE);
  check('hitPool size correct',               hitPool.length === HIT_POOL_SIZE);
  check('all muzzle inactive at start',       muzzlePool.every(p => !p.active));
  check('all hit inactive at start',          hitPool.every(p => !p.active));
  vfx.spawnMuzzleFlash(0,1,-3, 0,0,-1);
  check('muzzle particle activated',         muzzlePool.some(p => p.active));
  vfx.spawnHit(0,1,-4);
  check('hit particle activated',            hitPool.some(p => p.active));
  // Pool overflow: spawn more than pool size
  for(let i=0;i<MUZZLE_POOL_SIZE+3;i++) vfx.spawnMuzzleFlash(i*0.1,1,-3,0,0,-1);
  check('pool overflow recycles (no crash)', true); // if we get here = pass

  section('SETSIZE');
  try {
    vfxSys.setSize(800,600);
    vfxSys.setSize(1920,1080);
    vfxSys.setSize(1280,720);
    check('setSize no throw', true);
  } catch(e) { check(`setSize threw: ${e.message}`, false); }

  section('RESULT');
  log(`Pass: ${pass}  Fail: ${fail}  Total: ${pass+fail}`, fail===0?'ok':'fail');
  return { pass, fail };
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w=window.innerWidth, h=window.innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  vfxSys.setSize(w,h);
});

// ── FPS counter ───────────────────────────────────────────────────────────────
let fpsFrames=0, fpsLast=performance.now();
const fpsDisplay = document.getElementById('fps-display');

// ── Animate ───────────────────────────────────────────────────────────────────
let prev = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min((now - prev) / 1000, 0.05); prev = now;

  // Rotate target box gently
  targetBox.rotation.y += dt * 0.7;

  // Tick particles
  vfx.update(dt);

  // Render with bloom pipeline
  vfxSys.renderWithBloom(scene, camera, dt);

  // FPS
  fpsFrames++;
  if(now - fpsLast >= 500){
    fpsDisplay.textContent = `FPS: ${Math.round(fpsFrames * 1000 / (now - fpsLast))}`;
    fpsFrames=0; fpsLast=now;
  }
}
requestAnimationFrame(loop);

// Auto-run tests on load
setTimeout(() => {
  const {pass, fail} = runAutoTest();
  if(fail === 0){
    log(`\n모든 테스트 통과 (${pass}/${pass+fail})`, 'ok');
  } else {
    log(`\n${fail}개 실패 — 위 항목 확인`, 'fail');
  }
}, 300);
</script>
</body>
</html>
